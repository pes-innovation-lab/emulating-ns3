services:
  ns3:
    build:
      context: ./ns3
      dockerfile: Dockerfile
      args:
        - BUILD_PROF=debug
    container_name: ns3-simulator
    cap_add:
      - NET_ADMIN
      - NET_RAW # needed on some systems
    environment:
      - BUILD_PROF=debug
    volumes:
      - ./ns3/scratch:/app/ns-3/scratch/scripts

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        socat -v TCP-LISTEN:8080,crlf,reuseaddr,fork SYSTEM:"cat /etc/newman/response.txt"
    depends_on:
      - ns3
    volumes:
      - ./client:/etc/newman

  # NOTE: perhaps move this out of a container?
  netkit-init:
    build:
      context: ./netkit-init
      dockerfile: Dockerfile
    container_name: netkit_initializer
    network_mode: "host"
    pid: "host"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/netns:/var/run/netns:shared
    environment:
      - C1=ns3-simulator
      - C2=client
      - MAC1=00:00:00:00:00:01
      - MAC2=00:00:00:00:00:02
      - IP2=10.10.0.2
