services:
  ns3:
    build:
      context: ./ns3
      dockerfile: Dockerfile
      args:
        - BUILD_PROF=debug
    container_name: ns3-simulator
    cap_add:
      - NET_ADMIN
      - NET_RAW # needed on some systems
    environment:
      - BUILD_PROF=debug
    volumes:
      - ./ns3/scratch:/app/ns-3/scratch/scripts
      - ./ns3/run_sim.sh:/app/ns-3/run_sim.sh

  client:
    image: ghcr.io/astral-sh/uv:alpine
    container_name: client
    volumes:
      - ./client:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1 # have logs include python output
    command: ["uv", "run", "main.py"]

  # NOTE: perhaps move this out of a container?
  netkit-init:
    build:
      context: ./netkit-init
      dockerfile: Dockerfile
    container_name: netkit_initializer
    network_mode: "host"
    pid: "host"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/netns:/var/run/netns:shared
    environment:
      - C1=ns3-simulator
      - C2=client
      - MAC1=00:00:00:00:00:01
      - MAC2=00:00:00:00:00:02
      - IP2=10.10.0.2
